name: Gerar Painéis Autodefesa Brasil

on:
  push:
    paths:
      - 'dados/**'
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas openpyxl

      - name: Listar arquivos em dados/
        run: |
          echo "=== Arquivos em dados/ ==="
          find dados/ -type f
          echo "=========================="

      - name: Gerar Painel de OS
        run: |
          ARQUIVO=$(find dados/ -name "*.xlsx" | grep -i "OSS\|painel" | head -1)
          if [ -n "$ARQUIVO" ]; then
            echo "✅ Gerando Painel OS com: $ARQUIVO"
            python gerar_painel.py "$ARQUIVO"
            [ -f painel_OSS.html ] && mv painel_OSS.html painel_os.html
            [ -f painel_os.html ] && echo "✅ painel_os.html criado"
          else
            echo "⚠️ Nenhum arquivo de OS encontrado em dados/"
          fi

      - name: Gerar Painel Financeiro
        run: |
          ARQUIVO=$(find dados/ -name "*.xlsx" | grep -iE "SANKHYA|PAGAMENTO" | head -1)
          if [ -n "$ARQUIVO" ]; then
            echo "✅ Gerando Painel Financeiro com: $ARQUIVO"
            LOGO=$(find . -maxdepth 1 -name "*.webp" | head -1)
            if [ -n "$LOGO" ]; then
              python gerar_painel_pagamentos.py "$ARQUIVO" "$LOGO"
            else
              python gerar_painel_pagamentos.py "$ARQUIVO"
            fi
            [ -f index.html ] && mv index.html painel_pagamentos.html
            [ -f painel_pagamentos.html ] && echo "✅ painel_pagamentos.html criado"
          else
            echo "⚠️ Nenhum arquivo SANKHYA/PAGAMENTO encontrado em dados/"
          fi

      - name: Gerar Painel de Faturamento
        run: |
          ARQUIVO=$(find dados/ -name "*.xlsx" | grep -iE "FATURAMENTO" | head -1)
          if [ -n "$ARQUIVO" ]; then
            echo "✅ Gerando Painel de Faturamento com: $ARQUIVO"
            LOGO=$(find . -maxdepth 1 -name "*.webp" | head -1)
            if [ -n "$LOGO" ]; then
              python gerar_painel_faturamento.py "$ARQUIVO" "$LOGO"
            else
              python gerar_painel_faturamento.py "$ARQUIVO"
            fi
            [ -f painel_faturamento.html ] && echo "✅ painel_faturamento.html criado"
          else
            echo "⚠️ Nenhum arquivo de FATURAMENTO encontrado em dados/"
          fi

      - name: Restaurar hub de entrada
        run: cp hub_index.html index.html

      - name: Commit e Push dos painéis
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f index.html
          [ -f painel_os.html ]          && git add -f painel_os.html
          [ -f painel_pagamentos.html ]  && git add -f painel_pagamentos.html
          [ -f painel_faturamento.html ] && git add -f painel_faturamento.html
          git diff --staged --quiet && echo "Nada a commitar" && exit 0
          git commit -m "🤖 Painéis atualizados [$(date '+%d/%m/%Y %H:%M')]"
          git push origin HEAD:main --force-with-lease
