name: Gerar Painéis Autodefesa Brasil

on:
  push:
    paths:
      - 'dados/**.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas openpyxl

      - name: Gerar Painel de OS
        run: |
          ARQUIVO=$(ls dados/painel*.xlsx 2>/dev/null | head -1)
          if [ -n "$ARQUIVO" ]; then
            python gerar_painel.py "$ARQUIVO"
            mv painel_OSS.html painel_os.html
            echo "✅ Painel de OS gerado: $ARQUIVO"
          else
            echo "⚠️ Nenhum arquivo painel*.xlsx encontrado em dados/"
          fi

      - name: Gerar Painel Financeiro
        run: |
          ARQUIVO=$(ls dados/BASE*.xlsx 2>/dev/null | head -1)
          if [ -n "$ARQUIVO" ]; then
            python gerar_painel_pagamentos.py "$ARQUIVO" "OIP (1).webp"
            mv index.html painel_pagamentos.html
            echo "✅ Painel Financeiro gerado: $ARQUIVO"
          else
            echo "⚠️ Nenhum arquivo BASE*.xlsx encontrado em dados/"
          fi

      - name: Restaurar hub de entrada
        run: cp hub_index.html index.html

      - name: Commit e Push dos painéis
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add painel_os.html painel_pagamentos.html index.html
          git diff --staged --quiet || git commit -m "🤖 Painéis atualizados [$(date '+%d/%m/%Y %H:%M')]"
          git push
